<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iPharmEGY Admin Dashboard</title>

<style>
:root{
  --blue:#1565c0;
  --blue2:#1e40af;
  --green:#00c853;
  --bg:#f5f9ff;
  --card:#ffffff;
  --text:#0f172a;
  --muted:#64748b;
  --border:rgba(15,23,42,.08);
  --shadow:0 18px 40px rgba(2,8,23,.10);
  --r:18px;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:"Segoe UI",Arial,sans-serif;
  background:
    radial-gradient(900px 500px at 10% 10%, rgba(21,101,192,.12), transparent 60%),
    radial-gradient(800px 450px at 90% 20%, rgba(0,200,83,.10), transparent 60%),
    linear-gradient(180deg, #ffffff, var(--bg));
  color:var(--text);
}

/* ===== Topbar ===== */

.topbar{
  max-width:1200px;
  margin:18px auto;
  padding:14px 18px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  background:rgba(255,255,255,.85);
  border:1px solid var(--border);
  border-radius:999px;
  backdrop-filter:blur(10px);
  box-shadow:0 10px 25px rgba(2,8,23,.06);
}

.brand{
  display:flex;
  align-items:center;
  gap:12px;
}

.brand img{
  height:44px;
  filter:drop-shadow(0 8px 16px rgba(0,0,0,.12));
}

.brandTitle{
  font-weight:900;
  color:var(--blue2);
  font-size:15px;
}

.brandSub{
  font-size:12px;
  color:var(--muted);
}

.right{
  display:flex;
  align-items:center;
  gap:10px;
}

.user{
  padding:8px 12px;
  border-radius:999px;
  background:white;
  border:1px solid var(--border);
  font-size:12px;
  color:var(--muted);
}

.btn{
  padding:10px 14px;
  border-radius:14px;
  border:1px solid var(--border);
  background:white;
  font-weight:700;
  cursor:pointer;
}

.btn.primary{
  background:linear-gradient(135deg,var(--blue),var(--blue2));
  color:white;
  border:none;
  box-shadow:0 12px 24px rgba(21,101,192,.25);
}

/* ===== Container ===== */

.wrap{
  max-width:1200px;
  margin:auto;
  padding:10px 16px 40px;
}

/* ===== Cards ===== */

.grid{
  display:grid;
  gap:16px;
  grid-template-columns:repeat(4,1fr);
  margin-top:18px;
}

.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--r);
  padding:18px;
  box-shadow:var(--shadow);
  transition:.2s ease;
}

.card:hover{
  transform:translateY(-2px);
}

.card h3{
  margin:0;
  font-size:28px;
  color:var(--blue2);
}

.card span{
  display:block;
  margin-top:6px;
  font-size:13px;
  color:var(--muted);
}

/* ===== Activity ===== */

.activity{
  margin-top:18px;
  background:white;
  border-radius:var(--r);
  padding:18px;
  border:1px solid var(--border);
  box-shadow:var(--shadow);
}

.activity h2{
  margin:0 0 8px;
  font-size:16px;
}

.activity p{
  margin:0;
  font-size:13px;
  color:var(--muted);
}

/* ===== Responsive ===== */

@media(max-width:900px){
  .grid{grid-template-columns:1fr 1fr}
}

@media(max-width:520px){
  .grid{grid-template-columns:1fr}
}
</style>
</head>

<body>

<!-- Topbar -->

<div class="topbar">
  <div class="brand">
    <img src="/assets/AdminiPharmEGY.svg?v=5" alt="Logo">
    <div>
      <div class="brandTitle">iPharmEGY Admin Dashboard</div>
      <div class="brandSub">Secure Cloud Management System</div>
    </div>
  </div>

  <div class="right">
    <div class="user">Welcome, Admin</div>
    <button class="btn">Home</button>
    <button class="btn primary" onclick="location.reload()">Refresh</button>
  </div>
</div>

<div class="wrap">

  <!-- Snapshot Cards -->

  <div class="grid">
    <div class="card">
      <h3>145</h3>
      <span>Counted Items Today</span>
    </div>

    <div class="card">
      <h3>2</h3>
      <span>Open Inventories</span>
    </div>

    <div class="card">
      <h3>7</h3>
      <span>Variance Alerts</span>
    </div>

    <div class="card">
      <h3>Main</h3>
      <span>Active Branch</span>
    </div>
  </div>

  <!-- Activity -->

  <div class="activity">
    <h2>Recent Activity</h2>
    <p>Dashboard loaded successfully — No activity yet.</p>
  </div>

</div>

</body>
</html>
